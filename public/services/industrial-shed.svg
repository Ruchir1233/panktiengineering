<svg viewBox="0 0 800 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="isky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#90CAF9"/>
      <stop offset="100%" stop-color="#E3F2FD"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#isky)"/>
  <!-- Ground / road -->
  <rect x="0" y="360" width="800" height="140" fill="#78909C"/>
  <rect x="0" y="360" width="800" height="12" fill="#546E7A"/>
  <!-- Large industrial shed -->
  <!-- Main building body -->
  <rect x="50" y="160" width="700" height="200" fill="#B0BEC5"/>
  <!-- Pitched roof -->
  <polygon points="30,160 400,60 770,160" fill="#78909C"/>
  <!-- Roof highlight -->
  <polygon points="30,160 400,68 770,160 760,160 400,75 40,160" fill="#90A4AE"/>
  <!-- Ridge line -->
  <line x1="400" y1="60" x2="400" y2="160" stroke="#546E7A" stroke-width="3"/>
  <!-- Roof purlins (horizontal ribs) -->
  <line x1="35" y1="155" x2="395" y2="90" stroke="#607D8B" stroke-width="2"/>
  <line x1="35" y1="148" x2="392" y2="100" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="50" y1="140" x2="398" y2="110" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="765" y1="155" x2="405" y2="90" stroke="#607D8B" stroke-width="2"/>
  <line x1="765" y1="148" x2="408" y2="100" stroke="#607D8B" stroke-width="1.5"/>
  <line x1="750" y1="140" x2="402" y2="110" stroke="#607D8B" stroke-width="1.5"/>
  <!-- Column structural lines -->
  <rect x="50" y="160" width="10" height="200" fill="#546E7A"/>
  <rect x="190" y="160" width="10" height="200" fill="#546E7A"/>
  <rect x="330" y="160" width="10" height="200" fill="#546E7A"/>
  <rect x="460" y="160" width="10" height="200" fill="#546E7A"/>
  <rect x="600" y="160" width="10" height="200" fill="#546E7A"/>
  <rect x="740" y="160" width="10" height="200" fill="#546E7A"/>
  <!-- Wall panels -->
  <rect x="60" y="160" width="130" height="200" fill="#ECEFF1" opacity="0.7"/>
  <rect x="200" y="160" width="130" height="200" fill="#CFD8DC" opacity="0.7"/>
  <rect x="340" y="160" width="120" height="200" fill="#ECEFF1" opacity="0.7"/>
  <rect x="470" y="160" width="130" height="200" fill="#CFD8DC" opacity="0.7"/>
  <rect x="610" y="160" width="130" height="200" fill="#ECEFF1" opacity="0.7"/>
  <!-- Large roller door -->
  <rect x="300" y="230" width="200" height="130" fill="#37474F"/>
  <rect x="305" y="235" width="190" height="120" fill="#263238"/>
  <!-- Door horizontal lines -->
  <line x1="305" y1="255" x2="495" y2="255" stroke="#37474F" stroke-width="4"/>
  <line x1="305" y1="275" x2="495" y2="275" stroke="#37474F" stroke-width="4"/>
  <line x1="305" y1="295" x2="495" y2="295" stroke="#37474F" stroke-width="4"/>
  <line x1="305" y1="315" x2="495" y2="315" stroke="#37474F" stroke-width="4"/>
  <line x1="305" y1="335" x2="495" y2="335" stroke="#37474F" stroke-width="4"/>
  <!-- Ground level beam -->
  <rect x="50" y="357" width="700" height="8" fill="#455A64"/>
  <!-- Label -->
  <rect x="0" y="440" width="800" height="60" fill="#1565C0" opacity="0.92"/>
  <text x="400" y="472" text-anchor="middle" font-family="Arial,sans-serif" font-size="22" font-weight="bold" fill="white">INDUSTRIAL SHEDS</text>
  <text x="400" y="492" text-anchor="middle" font-family="Arial,sans-serif" font-size="13" fill="#BBDEFB">PEB · MS Structure · Factory, Warehouse &amp; Godown</text>
</svg>